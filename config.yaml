# 智能座舱街景理解系统配置

system:
  name: "智能座舱街景理解系统"
  version: "1.4.0"
  device: "cuda"

gaze:
  max_num_faces: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  smoothing_window: 5

gesture:
  max_num_hands: 2
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.5
  pointing_threshold: 160

attention:
  gaze_weight: 0.5
  gesture_weight: 0.35
  detection_weight: 0.15
  gaze_hit_radius: 0.35
  confirm_frames: 3

knowledge:
  enabled: true
  db_path: "data/knowledge/buildings.json"
  top_k: 3
  web_search: true
  max_brief_len: 30
  # 联网检索超时（秒）：多源并行竞速，整体上限 web_timeout
  web_timeout: 8.0
  web_connect_timeout: 3.0
  web_read_timeout: 10.0
  web_enable_ddg: false   # 国内环境 DDG 常慢/不可用，默认关闭
  web_enable_bing: true   # POI/周边类问题 Bing 备用检索
  web_enable_sogou: true   # POI/周边类问题搜狗备用检索

# 问答：大模型 + 联网整理（你之前调好的配置）
qa:
  offline: false
  use_llm: true

# 可选大模型
llm:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  max_new_tokens: 256
  temperature: 0.5

custom_yolo:
  root: "models/yolo"
  weights: "weights/best_epoch_weights.pth"
  classes: "model_data/voc_classes.txt"
  confidence: 0.25
  nms_iou: 0.3
  phi: "s"

video:
  path: "data/videos/GuoMao.mp4"
  width: 1366
  height: 768
  fps: 15
  redetect_interval: 8

ui:
  host: "0.0.0.0"
  port: 7860
  share: false

# 多智能体协作（work.md 五阶段架构）
agents:
  parallel_vision: 3        # 相同角色并行 Vision Agent 数量
  max_critic_retries: 2     # Critic 不通过时 Writer 最大重写次数
  use_llm_writer: true      # Writer 用大模型润色，避免模板回复千篇一律

# 智能座舱街景理解系统配置

system:
  name: "智能座舱街景理解系统"
  version: "1.3.0"
  device: "cuda"

gaze:
  max_num_faces: 1
  min_detection_confidence: 0.5
  min_tracking_confidence: 0.5
  smoothing_window: 5

gesture:
  max_num_hands: 2
  min_detection_confidence: 0.7
  min_tracking_confidence: 0.5
  pointing_threshold: 160

attention:
  gaze_weight: 0.5
  gesture_weight: 0.35
  detection_weight: 0.15
  gaze_hit_radius: 0.35
  confirm_frames: 3

knowledge:
  enabled: true
  db_path: "data/knowledge/buildings.json"
  top_k: 3
  web_search: false
  max_brief_len: 30

# 问答：默认纯本地（毫秒级），不联网不加载大模型
qa:
  offline: true
  use_llm: false

# 可选大模型（use_llm: true 时启用，较慢）
llm:
  model_name: "Qwen/Qwen2.5-1.5B-Instruct"
  max_new_tokens: 128
  temperature: 0.3

custom_yolo:
  root: "models/yolo"
  weights: "weights/best_epoch_weights.pth"
  classes: "model_data/voc_classes.txt"
  confidence: 0.25
  nms_iou: 0.3
  phi: "s"

video:
  path: "data/videos/GuoMao.mp4"
  width: 1366
  height: 768
  fps: 15
  redetect_interval: 8

ui:
  host: "0.0.0.0"
  port: 7860
  share: false

qa:
  offline: false
  use_llm: true